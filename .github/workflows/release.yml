name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: save-my-claude-token

jobs:
  build:
    name: build-${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_arch: x86_64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            asset_arch: aarch64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            asset_arch: x86_64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            asset_arch: aarch64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            asset_arch: x86_64
            archive_ext: zip
          - goos: windows
            goarch: arm64
            asset_arch: aarch64
            archive_ext: zip

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: test
        run: go test ./...

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ext=".exe"
          fi
          go build -trimpath -ldflags="-s -w" -o "dist/${APP_NAME}${ext}" ./cmd/save-my-claude-token

      - name: package-tar
        if: matrix.archive_ext == 'tar.gz'
        run: |
          asset="${APP_NAME}_${{ matrix.goos }}_${{ matrix.asset_arch }}.tar.gz"
          tar -C dist -czf "$asset" "${APP_NAME}"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: package-zip
        if: matrix.archive_ext == 'zip'
        run: |
          asset="${APP_NAME}_${{ matrix.goos }}_${{ matrix.asset_arch }}.zip"
          cd dist
          zip -q "../$asset" "${APP_NAME}.exe"
          cd ..
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  publish:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: download-artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: create-release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" release-assets/* --generate-notes

