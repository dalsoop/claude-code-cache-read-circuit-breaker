  <text x="110" y="410" fill="#1E1E1E" font-family="Arial, sans-serif" font-size="18">output_tokens: 6,597</text>
  <text x="502" y="410" fill="#8A7E6B" font-family="Arial, sans-serif" font-size="18">0.05%</text>

  <circle cx="92" cy="440" r="8" fill="#2F5DA9"/>
