  <rect x="802" y="212" width="2" height="44" fill="#FFFDF8"/>
  <rect x="804" y="212" width="2" height="44" fill="#3D7A6D"/>
  <rect x="806" y="212" width="1" height="44" fill="#C18B2F"/>
  <rect x="807" y="212" width="1" height="44" fill="#2F5DA9"/>

  <text x="84" y="286" fill="#5E5547" font-family="Arial, sans-serif" font-size="18">Total: 12,183,667</text>

  <circle cx="92" cy="332" r="8" fill="#B4452C"/>
  <text x="110" y="338" fill="#1E1E1E" font-family="Arial, sans-serif" font-size="18">cache_read_input_tokens: 12,155,503</text>
  <text x="502" y="338" fill="#8A7E6B" font-family="Arial, sans-serif" font-size="18">99.77%</text>

  <circle cx="92" cy="368" r="8" fill="#3D7A6D"/>
