  <rect x="842" y="184" width="258" height="232" rx="18" fill="#F8F2E8" stroke="#D8CDBA"/>
  <text x="870" y="228" fill="#1E1E1E" font-family="Arial, sans-serif" font-size="18" font-weight="700">What actually happened</text>
  <text x="870" y="266" fill="#5E5547" font-family="Arial, sans-serif" font-size="16">- 42 assistant responses</text>
  <text x="870" y="294" fill="#5E5547" font-family="Arial, sans-serif" font-size="16">- same long-lived session reused</text>
  <text x="870" y="322" fill="#5E5547" font-family="Arial, sans-serif" font-size="16">- roughly 280k to 296k cache</text>
  <text x="870" y="350" fill="#5E5547" font-family="Arial, sans-serif" font-size="16">  tokens re-read each time</text>
  <text x="870" y="386" fill="#1E1E1E" font-family="Arial, sans-serif" font-size="16" font-weight="700">Interpretation</text>
  <text x="870" y="414" fill="#5E5547" font-family="Arial, sans-serif" font-size="16">This was mostly repeated cached</text>
  <text x="870" y="442" fill="#5E5547" font-family="Arial, sans-serif" font-size="16">context, not fresh prompt input.</text>
