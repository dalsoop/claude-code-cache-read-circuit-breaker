  <text x="84" y="98" fill="#1E1E1E" font-family="Georgia, serif" font-size="34" font-weight="700">March 27, 2026 Incident</text>
  <text x="84" y="132" fill="#5E5547" font-family="Arial, sans-serif" font-size="20">KST 22:00-23:00. One Claude session made the UI look like I burned 12.18M tokens in an hour.</text>

  <text x="84" y="184" fill="#1E1E1E" font-family="Arial, sans-serif" font-size="20" font-weight="700">Token breakdown</text>
